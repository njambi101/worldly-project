<body>
    <h3>rock paper scissors</h3>
    <button onclick="
   playgame('rock');">rock</button>

    <button onclick="
      playgame('paper');">paper</button>



    <button onclick="    
    playgame('scissors');">scissors </button>

    <button onclick="
        
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;  
        
    alert('score reset');
        
        ">reset</button>
    <p class="js-score"></p>

    <p class="js-answers"></p>

    <p class="js-message"></p>
    <script>
        const score = {
            wins: 0,
            losses: 0,
            ties: 0
        };


        function playgame(playerMove) {

            const moves = playwithme();
            let persons = '';
            if (playerMove === 'rock') {

                if (moves === 'rock') {
                    persons = ' tie';
                } else if (moves === 'paper') {
                    persons = ' you loose';
                } else if (moves === 'scissors') {
                    persons = ' your the sigma you win';

                }
            } else if (playerMove === 'paper') {
                if (moves === 'rock') {
                    persons = ' your the sigma you win';
                } else if (moves === 'paper') {
                    persons = ' tie';
                } else if (moves === 'scissors') {
                    persons = ' you loose';

                }

            } else if (playerMove === 'scissors') {
                if (moves === 'rock') {
                    persons = 'you loose';
                } else if (moves === 'paper') {
                    persons = ' your the sigma you win';
                } else if (moves === 'scissors') {
                    persons = ' tie';

                }
            }
            if (persons === ' your the sigma you win') {
                score.wins += 1;
            } else if (persons === ' you loose') {
                score.losses += 1;
            } else if (persons === ' tie') {
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));
            answer = JSON.parse(localStorage.getItem('score'));

            document.querySelector('.js-answers').innerHTML = persons;
            document.querySelector('.js-message').innerHTML = `computer picked ${moves} and you picked ${playerMove}`;

            document.querySelector('.js-score').textContent = `wins: ${score.wins}, losses: ${score.losses}, ties: ${score.ties}`;




        }


        function playwithme() {
            let moves = '';
            const choices = Math.random();
            if (choices >= 0 && choices < 1 / 3) {
                moves = 'paper';
            } else if (choices >= 1 / 3 && choices < 2 / 3) {
                moves = 'rock';
            } else if (choices >= 2 / 3 && choices < 1) {
                moves = 'scissors';
            };

            return moves;
        }

    </script>
</body>
