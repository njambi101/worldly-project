<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    
</head>
<body>
<h3>cart quantity</h3>
<button onclick="console.log('Current quantity: ' + cartQuantity)">show quantity</button>
<button onclick="
  cartQuantity ++;
  console.log('Added to cart. Current quantity: ' + cartQuantity);
">add to cart</button>
<button onclick ="
  cartQuantity += 2;
  console.log('Added to cart. Current quantity: ' + cartQuantity);"
>+2</button>
<button onclick="
  cartQuantity += 3;
  console.log('Added to cart. Current quantity: ' + cartQuantity);"
>+3</button>
<button onclick="
  cartQuantity --;
  console.log('Removed from cart. Current quantity: ' + cartQuantity);"
>remove from cart</button>
<button onclick="
  cartQuantity = 0;
  console.log('Cart reset. Current quantity: ' + cartQuantity);"
>reset cart</button>
<script>
let cartQuantity = 0;
</script>
</body>
